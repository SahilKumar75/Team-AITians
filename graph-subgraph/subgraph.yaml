specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: IdentityRegistry
    network: polygon-amoy
    source:
      address: "0x56c25aE1c7715755578f5a80d9b3586d3744eD57"
      abi: IdentityRegistry
      startBlock: 34543629
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Identity
        - Doctor
        - Hospital
      abis:
        - name: IdentityRegistry
          file: ./abis/IdentityRegistry.json
      eventHandlers:
        - event: IdentityRegistered(indexed bytes32,indexed address,bytes32)
          handler: handleIdentityRegistered
        - event: LockAUpdated(indexed bytes32,string)
          handler: handleLockAUpdated
        - event: TitleUpdated(indexed bytes32,string)
          handler: handleTitleUpdated
      file: ./src/identity-registry.ts
  - kind: ethereum
    name: HealthRegistry
    network: polygon-amoy
    source:
      address: "0x0e61DEC0A20808c004bC13dDa75c3Ff3340b7A91"
      abi: HealthRegistry
      startBlock: 34543633
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Record
        - AccessGrant
      abis:
        - name: HealthRegistry
          file: ./abis/HealthRegistry.json
      eventHandlers:
        - event: RecordAdded(indexed bytes32,indexed address,indexed address,string,bytes32,uint256)
          handler: handleRecordAdded
        - event: RecordDeactivated(indexed bytes32,indexed address)
          handler: handleRecordDeactivated
        - event: AccessGranted(indexed bytes32,indexed address,string)
          handler: handleAccessGranted
        - event: AccessRevoked(indexed bytes32,indexed address)
          handler: handleAccessRevoked
      file: ./src/health-registry.ts
